name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: ENV_FILE_B64,NPMRC_FILE_B64
          script: |
            echo "$ENV_FILE_B64" | base64 -d > /var/www/orslab/.env
            echo "$NPMRC_FILE_B64" | base64 -d > /var/www/orslab/.npmrc
            cd /var/www/orslab/ors-payment-service
            git pull origin main
            npm install --production
            pm2 restart ors-payment
            echo "Deploy completed: $(date)"
        env:
          ENV_FILE_B64: ${{ secrets.ENV_FILE_B64 }}
          NPMRC_FILE_B64: ${{ secrets.NPMRC_FILE_B64 }}
